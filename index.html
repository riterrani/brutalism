<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brutalist WFC Generator</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; }
      #c { display: block; width: 100%; height: 100%; }
      #ui {
        position: absolute;
        top: 16px;
        left: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        font-family: 'Courier New', monospace;
        font-size: 13px;
        color: #ccc;
        user-select: none;
      }
      #ui button {
        padding: 8px 16px;
        background: #333;
        color: #ccc;
        border: 1px solid #555;
        font-family: inherit;
        font-size: inherit;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      #ui button:hover { background: #444; }
      #ui input[type="text"] {
        padding: 6px 10px;
        background: #222;
        color: #ccc;
        border: 1px solid #555;
        font-family: inherit;
        font-size: inherit;
        width: 120px;
      }
      #ui label { display: flex; align-items: center; gap: 8px; }
      #ui input[type="range"] { width: 120px; }
      #status {
        position: absolute;
        bottom: 16px;
        left: 16px;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        color: #666;
      }

      /* ===== EDITOR PANEL ===== */
      #editor {
        position: absolute;
        top: 0;
        right: 0;
        height: 100%;
        display: flex;
        flex-direction: row;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        color: #ccc;
        user-select: none;
        z-index: 10;
      }

      #editor-toggle {
        align-self: flex-start;
        margin-top: 16px;
        padding: 6px 10px;
        background: #2a2a2a;
        color: #999;
        border: 1px solid #444;
        font-family: inherit;
        font-size: 16px;
        cursor: pointer;
        line-height: 1;
      }
      #editor-toggle:hover { background: #3a3a3a; color: #ccc; }

      #editor-panel {
        width: 280px;
        height: 100%;
        overflow-y: auto;
        background: #1e1e1e;
        border-left: 1px solid #333;
        padding: 12px;
      }

      /* Scrollbar */
      #editor-panel::-webkit-scrollbar { width: 6px; }
      #editor-panel::-webkit-scrollbar-track { background: #1e1e1e; }
      #editor-panel::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
      #editor-panel::-webkit-scrollbar-thumb:hover { background: #555; }

      .editor-section {
        margin-bottom: 16px;
        border-bottom: 1px solid #333;
        padding-bottom: 12px;
      }
      .editor-section:last-child { border-bottom: none; }

      .editor-section h3 {
        font-size: 11px;
        font-weight: normal;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #777;
        margin-bottom: 8px;
      }

      /* Tile group headers */
      .tile-group-header {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #555;
        margin-top: 8px;
        margin-bottom: 4px;
        padding-top: 4px;
        border-top: 1px solid #2a2a2a;
      }
      .tile-group-header:first-of-type { border-top: none; margin-top: 0; }

      /* Tile rows */
      .tile-row {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 2px 0;
      }

      .tile-row input[type="checkbox"] {
        accent-color: #888;
        cursor: pointer;
        flex-shrink: 0;
      }

      .tile-name {
        font-size: 11px;
        color: #aaa;
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tile-weight {
        width: 60px !important;
        flex-shrink: 0;
        accent-color: #888;
      }

      .tile-weight-val {
        font-size: 10px;
        color: #666;
        width: 24px;
        text-align: right;
        flex-shrink: 0;
      }

      /* Socket matrix */
      .socket-matrix {
        border-collapse: collapse;
        font-size: 10px;
      }
      .socket-matrix th,
      .socket-matrix td {
        padding: 2px;
        text-align: center;
      }
      .socket-matrix th {
        color: #777;
        font-weight: normal;
        font-size: 9px;
      }
      .socket-label {
        color: #777;
        text-align: right !important;
        padding-right: 4px !important;
        font-size: 9px;
      }
      .socket-matrix input[type="checkbox"] {
        accent-color: #888;
        cursor: pointer;
        width: 14px;
        height: 14px;
      }

      /* Grid dimension rows */
      .dim-row {
        margin-bottom: 6px;
      }
      .dim-row label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: #aaa;
      }
      .dim-row input[type="range"] {
        width: 100px;
        accent-color: #888;
      }

      /* Editor buttons */
      #editor-panel button {
        display: block;
        width: 100%;
        padding: 6px 12px;
        margin-bottom: 6px;
        background: #2a2a2a;
        color: #aaa;
        border: 1px solid #444;
        font-family: inherit;
        font-size: 11px;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      #editor-panel button:hover { background: #3a3a3a; color: #ccc; }

      /* ===== CHEATSHEET ===== */
      #cheatsheet {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        max-width: 1000px;
        height: 85%;
        background: rgba(26, 26, 26, 0.95);
        border: 1px solid #444;
        display: none;
        flex-direction: column;
        z-index: 100;
        font-family: 'Courier New', monospace;
        color: #ccc;
        box-shadow: 0 0 50px rgba(0,0,0,0.8);
      }

      #cheatsheet-header {
        padding: 16px;
        background: #2a2a2a;
        border-bottom: 1px solid #444;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #cheatsheet-header h2 {
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 3px;
        margin: 0;
      }

      #cheatsheet-close {
        background: none;
        border: 1px solid #555;
        color: #999;
        padding: 4px 8px;
        cursor: pointer;
        font-family: inherit;
      }
      #cheatsheet-close:hover { background: #3a3a3a; color: #ccc; }

      #cheatsheet-content {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
      }

      .block-card {
        background: #222;
        border: 1px solid #333;
        display: flex;
        flex-direction: column;
        padding: 10px;
        transition: border-color 0.2s;
      }
      .block-card:hover { border-color: #555; }

      .block-preview {
        width: 100%;
        aspect-ratio: 1;
        background: #111;
        margin-bottom: 8px;
        position: relative;
      }

      .block-info {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .block-id {
        font-size: 11px;
        font-weight: bold;
        color: #888;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .block-sockets {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2px;
        margin-top: 4px;
      }

      .socket-box {
        font-size: 8px;
        padding: 2px;
        background: #1a1a1a;
        border: 1px solid #333;
        text-align: center;
        color: #666;
        width: 100%;
        cursor: pointer;
      }
      .socket-box.active { color: #aaa; border-color: #444; }
      .socket-box option { background: #1a1a1a; color: #ccc; }

      .block-controls {
        margin-top: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .block-controls input[type="range"] { flex: 1; accent-color: #666; }
      .block-controls span { font-size: 10px; color: #666; width: 20px; text-align: right; }

      #cheatsheet-toggle-btn {
        position: absolute;
        bottom: 16px;
        right: 16px;
        padding: 8px 16px;
        background: #333;
        color: #ccc;
        border: 1px solid #555;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1px;
        z-index: 10;
      }
      #cheatsheet-toggle-btn:hover { background: #444; }

      /* Pagination */
      #cheatsheet-footer {
        padding: 12px;
        background: #2a2a2a;
        border-top: 1px solid #444;
        display: flex;
        justify-content: center;
        gap: 10px;
      }
      .page-btn {
        background: #222;
        border: 1px solid #444;
        color: #888;
        padding: 4px 10px;
        cursor: pointer;
        font-family: inherit;
      }
      .page-btn.active { background: #444; color: #fff; border-color: #666; }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="ui"></div>
    <div id="status"></div>
    <div id="editor"></div>
    
    <button id="cheatsheet-toggle-btn">Blocks Cheatsheet</button>
    <div id="cheatsheet">
      <div id="cheatsheet-header">
        <h2>Blocks Cheatsheet</h2>
        <button id="cheatsheet-close">CLOSE [ESC]</button>
      </div>
      <div id="cheatsheet-content"></div>
      <div id="cheatsheet-footer"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
